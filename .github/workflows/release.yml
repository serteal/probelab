name: Release

# Automated release on a version bump.
#
# To cut a release:
#   1. Bump ``__version__`` in ``probelab/_version.py``.
#   2. Add the matching section to ``CHANGELOG.md`` (heading ``## <version>``).
#   3. Open a PR and add the ``release`` label to it.
#   4. Merge to ``main``.
#
# After CI passes on ``main`` this workflow checks that the merged PR carried the
# ``release`` label, validates the version bump, then creates the ``v<version>``
# tag + GitHub Release. Publishing the release triggers ``publish.yml`` (PyPI).
#
# Without the ``release`` label nothing happens — normal PRs merge as usual.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write       # create the tag and GitHub Release
  pull-requests: read   # read labels off the merged PR

jobs:
  release:
    name: Tag and release on version bump
    runs-on: ubuntu-latest
    # Only act on a green CI run that came from a push to main.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    env:
      GH_TOKEN: ${{ github.token }}
      SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0   # need history to diff _version.py against the parent

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packaging
        run: pip install packaging

      - name: Check for the release label on the merged PR
        id: gate
        run: |
          labels=$(gh api "repos/${{ github.repository }}/commits/${SHA}/pulls" \
            --jq '[.[].labels[].name]' 2>/dev/null || echo '[]')
          echo "Associated PR labels: $labels"
          if echo "$labels" | grep -q '"release"'; then
            echo "requested=true" >> "$GITHUB_OUTPUT"
          else
            echo "requested=false" >> "$GITHUB_OUTPUT"
            echo "No 'release' label on the merged PR; skipping release."
          fi

      - name: Read and validate the version bump
        id: version
        if: steps.gate.outputs.requested == 'true'
        run: |
          extract() { grep -oP '__version__\s*=\s*"\K[^"]+' "$1"; }

          new=$(extract probelab/_version.py)
          if [ -z "$new" ]; then
            echo "::error::Could not read __version__ from probelab/_version.py"
            exit 1
          fi

          # Previous version at the parent commit (empty if the file is new).
          if git cat-file -e "${SHA}^:probelab/_version.py" 2>/dev/null; then
            old=$(git show "${SHA}^:probelab/_version.py" | grep -oP '__version__\s*=\s*"\K[^"]+' || true)
          else
            old=""
          fi
          echo "old=$old new=$new"

          if [ "$new" = "$old" ]; then
            echo "::error::The PR is labelled 'release' but probelab/_version.py was not bumped (still $new)."
            exit 1
          fi

          python - "$new" "$old" <<'PY'
          import sys
          from packaging.version import InvalidVersion, Version

          new, old = sys.argv[1], sys.argv[2]
          try:
              nv = Version(new)
          except InvalidVersion:
              sys.exit(f"::error::{new!r} is not a valid PEP 440 version")
          if old:
              try:
                  ov = Version(old)
              except InvalidVersion:
                  ov = None
              if ov is not None and not nv > ov:
                  sys.exit(f"::error::new version {new} must be strictly greater than {old}")
          print(f"Version bump OK: {old or '(none)'} -> {new}")
          PY

          if git rev-parse "v${new}" >/dev/null 2>&1; then
            echo "::error::Tag v${new} already exists. PyPI versions are immutable; bump to a new version."
            exit 1
          fi

          echo "version=$new" >> "$GITHUB_OUTPUT"

      - name: Extract changelog notes
        id: notes
        if: steps.gate.outputs.requested == 'true'
        run: |
          new="${{ steps.version.outputs.version }}"
          awk -v ver="$new" '
            $0 ~ "^## " ver "([ ).-]|$)" { flag=1; next }
            flag && /^## / { exit }
            flag { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "::error::No '## ${new}' section found in CHANGELOG.md. Add release notes before releasing."
            exit 1
          fi
          echo "Release notes:"
          cat notes.md

      - name: Create tag and GitHub Release
        if: steps.gate.outputs.requested == 'true'
        run: |
          new="${{ steps.version.outputs.version }}"
          gh release create "v${new}" \
            --target "${SHA}" \
            --title "v${new}" \
            --notes-file notes.md
          echo "Created release v${new}; publish.yml will push it to PyPI."
