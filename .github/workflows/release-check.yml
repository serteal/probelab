name: Release check

# PR-time guard for release consistency. A release is driven by a version bump,
# and a bump must come with changelog notes. This check enforces: whenever
# ``probelab/_version.py`` changes, the bump must be valid (PEP 440, strictly
# increasing, tag not already used) and ``CHANGELOG.md`` must carry a matching
# ``## <version>`` section. A PR that does not touch the version passes
# untouched.
#
# Make this a required status check in branch protection for ``main`` so it
# actually blocks merges.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  release-consistency:
    name: Release consistency
    runs-on: ubuntu-latest
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0   # need base + head to diff _version.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packaging
        run: pip install packaging

      - name: Enforce release consistency
        run: |
          set -euo pipefail
          extract() { grep -oP '__version__\s*=\s*"\K[^"]+' || true; }

          new=$(extract < probelab/_version.py)
          if git cat-file -e "${BASE_SHA}:probelab/_version.py" 2>/dev/null; then
            old=$(git show "${BASE_SHA}:probelab/_version.py" | extract)
          else
            old=""
          fi

          version_changed=false
          [ -n "$new" ] && [ "$new" != "$old" ] && version_changed=true
          echo "version: ${old:-(none)} -> ${new:-(none)} (changed=$version_changed)"

          # No version bump -> ordinary PR, nothing to enforce.
          if [ "$version_changed" != "true" ]; then
            echo "No version bump. OK."
            exit 0
          fi

          echo "Version bump detected; changelog entry and a valid bump are required."
          errors=0

          # Changelog must carry a section for the new version.
          notes=$(awk -v ver="$new" '
            $0 ~ "^## " ver "([ ).-]|$)" { flag=1; next }
            flag && /^## / { exit }
            flag { print }
          ' CHANGELOG.md)
          if [ -z "$(echo "$notes" | tr -d '[:space:]')" ]; then
            echo "::error::No '## ${new}' section with notes found in CHANGELOG.md."
            errors=1
          fi

          # Validate the bump itself.
          set +e
          python - "$new" "$old" <<'PY'
          import subprocess
          import sys
          from packaging.version import InvalidVersion, Version

          new, old = sys.argv[1], sys.argv[2]
          rc = 0
          try:
              nv = Version(new)
          except InvalidVersion:
              print(f"::error::{new!r} is not a valid PEP 440 version")
              sys.exit(1)
          if old:
              try:
                  if not nv > Version(old):
                      print(f"::error::new version {new} must be strictly greater than {old}")
                      rc = 1
              except InvalidVersion:
                  pass
          tags = subprocess.run(
              ["git", "tag", "--list", f"v{new}"],
              capture_output=True, text=True,
          ).stdout.strip()
          if tags:
              print(f"::error::Tag v{new} already exists; PyPI is immutable, bump to a new version.")
              rc = 1
          sys.exit(rc)
          PY
          [ $? -ne 0 ] && errors=1
          set -e

          if [ "$errors" -ne 0 ]; then
            echo "Release consistency check failed."
            exit 1
          fi
          echo "Release consistency check passed: version bump and changelog entry present."
